# Self-hosted stack: postgres + api + web. `docker compose up --build`.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meals}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meals}
      POSTGRES_DB: ${POSTGRES_DB:-meals}
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-meals}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    working_dir: /repo
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-meals}:${POSTGRES_PASSWORD:-meals}@postgres:5432/${POSTGRES_DB:-meals}?schema=public
      API_PORT: '3001'
      API_HOST: 0.0.0.0
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8090}
      # OCR: local vision model by default. host.docker.internal reaches a server on the host.
      OCR_PROVIDER: ${OCR_PROVIDER:-local}
      OCR_LOCAL_BASE_URL: ${OCR_LLM_URL_DOCKER:-http://host.docker.internal:11434/v1}
      OCR_LOCAL_MODEL: ${OCR_LOCAL_MODEL:-qwen2.5vl:3b}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b}
      OCR_LOCAL_API_KEY: ${OCR_LOCAL_API_KEY:-}
      KROGER_CLIENT_ID: ${KROGER_CLIENT_ID:-}
      KROGER_CLIENT_SECRET: ${KROGER_CLIENT_SECRET:-}
      KROGER_REDIRECT_URI: ${KROGER_REDIRECT_URI:-http://localhost:8090/api/integrations/kroger/callback}
      KROGER_API_BASE: ${KROGER_API_BASE:-https://api.kroger.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OCR_MODEL: ${OCR_MODEL:-claude-sonnet-5}
      OCR_ESCALATION_MODEL: ${OCR_ESCALATION_MODEL:-claude-opus-4-8}
      # Cloudflare Access: set both to log users in as their authenticated email.
      CF_ACCESS_TEAM_DOMAIN: ${CF_ACCESS_TEAM_DOMAIN:-}
      CF_ACCESS_AUD: ${CF_ACCESS_AUD:-}
      NODE_ENV: production
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    # Sync the schema (MVP uses db push; switch to migrate deploy once migrations exist), then serve.
    command: sh -c "pnpm --filter @meals/db push && pnpm --filter @meals/api start"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${API_HOST_PORT:-3001}:3001'
    volumes:
      - storage:/repo/apps/api/storage

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # "/api" = same-origin through nginx; reachable from phones on the LAN.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    depends_on:
      - api
    # Host port overridable via WEB_PORT (default 8090; :8080 collides on many machines).
    ports:
      - '${WEB_PORT:-8090}:80'

volumes:
  pgdata:
  storage:
