server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: unknown routes serve index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Never cache the service worker or the app shell.
  location = /sw.js {
    add_header Cache-Control "no-cache";
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
}
