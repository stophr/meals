server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Same-origin API proxy: the PWA calls /api/*, nginx forwards to the api container.
  # This makes the app work from any device on the LAN — no host IP baked into the bundle.
  location /api/ {
    # Re-resolve the api container's IP via Docker's embedded DNS (127.0.0.11) instead of
    # caching it once at startup — otherwise recreating the api container (new IP) 502s every
    # /api request until nginx is restarted. Using a variable in proxy_pass forces re-resolution.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://api:3001;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 20m; # receipt photo uploads (api caps at 15m)
    proxy_buffering off;      # SSE-safe for /api/jobs/:id/stream
    proxy_read_timeout 300s;  # local OCR first call can be slow (model load)
  }

  # SPA fallback: unknown routes serve index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Never cache the service worker or the app shell.
  location = /sw.js {
    add_header Cache-Control "no-cache";
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
}
